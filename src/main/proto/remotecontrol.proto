syntax = "proto3";
package iov.vagw.remotecontrol.v1;

option java_package = "net.hwyz.iov.cloud.edd.vagw.proto";
option java_outer_classname = "RemoteControlProto";

message RemoteControlCommand {
  Command command = 1;
  map<string, string> params = 2;
}

enum Command {
  COMMAND_UNSPECIFIED = 0;
  DOOR_LOCK = 1;
  DOOR_UNLOCK = 2;
  AC_START = 3;
  AC_STOP = 4;
  FIND_VEHICLE = 5;
}

message RemoteControlAck {
  string ref_msg_id = 1;
  AckStage stage = 2;
  uint32 result_code = 3;
  string message = 4;
}

enum AckStage {
  ACK_STAGE_UNSPECIFIED = 0;
  RECEIVED = 1;
  EXECUTING = 2;
  SUCCEEDED = 3;
  FAILED = 4;
}
