server:
  port: 10804

spring:
  application:
    name: vagw

# TSP Device Admission Service configuration
tsp:
  device-admission:
    url: http://tsp-service:8080

# KMS Key Prov Service configuration
kms:
  keyprov:
    url: http://kms-service:8080
    connect-timeout: 1000
    read-timeout: 5000

feign:
  client:
    config:
      tsp-device-admission:
        connectTimeout: 500
        readTimeout: 500
        loggerLevel: basic
  circuitbreaker:
    enabled: true
